services:
  db:
    image: postgres:15-alpine
    container_name: vetdata_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-vetdata}
      POSTGRES_USER: ${POSTGRES_USER:-vetdata}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-vetdata} -d ${POSTGRES_DB:-vetdata}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: vetdata_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:${HOST_BACKEND_PORT:-8000}:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://api.example.com/api/v1}
        VITE_CLERK_PUBLISHABLE_KEY: ${VITE_CLERK_PUBLISHABLE_KEY:-pk_live_replace_me}
    container_name: vetdata_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:${HOST_FRONTEND_PORT:-8080}:80"

volumes:
  postgres_data:
